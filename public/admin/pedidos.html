<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Pedidos — Admin Doce Sabor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="/" class="navbar-logo"><span class="logo-icon">🍦</span> Doce Sabor</a>
    <div class="navbar-actions">
      <span style="font-size:.85rem;color:var(--gray)">🔑 Admin: <strong id="userName"></strong></span>
      <button class="btn btn-outline btn-sm" id="logoutBtn">Sair</button>
    </div>
  </div>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-top">
      <h2>⚙️ Painel Admin</h2>
      <p>Gerencie sua sorveteria</p>
    </div>
    <a href="/admin/index.html"    class="admin-nav-item"><span class="icon">📊</span> Dashboard</a>
    <a href="/admin/produtos.html" class="admin-nav-item"><span class="icon">🍨</span> Produtos</a>
    <a href="/admin/pedidos.html"  class="admin-nav-item active"><span class="icon">📦</span> Pedidos</a>
    <a href="/admin/cupons.html"   class="admin-nav-item"><span class="icon">🎟️</span> Cupons</a>
    <a href="/"                    class="admin-nav-item"><span class="icon">🌐</span> Ver Site</a>
  </aside>

  <main class="admin-content">
    <div class="admin-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h1>📦 Pedidos</h1>
        <p>Gerencie e atualize o status dos pedidos</p>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <select id="filterStatus" class="form-control" style="width:auto" onchange="loadAdminPedidos()">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="confirmado">Confirmado</option>
          <option value="preparando">Preparando</option>
          <option value="saiu_entrega">Saiu p/ Entrega</option>
          <option value="entregue">Entregue</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadAdminPedidos()">🔄 Atualizar</button>
      </div>
    </div>

    <div class="table-wrapper">
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>Data</th>
              <th>Endereço</th>
              <th>Total</th>
              <th>Status</th>
              <th>Alterar Status</th>
            </tr>
          </thead>
          <tbody id="pedidosTbody">
            <tr><td colspan="7" style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
