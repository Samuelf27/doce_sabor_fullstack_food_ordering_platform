<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Checkout — Doce Sabor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="/" class="navbar-logo"><span class="logo-icon">🍦</span> Doce Sabor</a>
    <div class="navbar-actions">
      <div id="userMenu" style="display:none;align-items:center;gap:8px">
        <button class="btn btn-outline btn-sm" id="logoutBtn">Sair</button>
      </div>
    </div>
  </div>
</nav>

<div class="checkout-page">
  <div class="container">
    <h1 style="font-size:1.6rem;margin-bottom:24px">✅ Finalizar Pedido</h1>

    <!-- STEPPER -->
    <div class="stepper" id="stepper">
      <div class="step-item active" id="stepItem1">
        <div class="step-circle">1</div>
        <span class="step-label">Entrega</span>
      </div>
      <div class="step-connector" id="conn1"></div>
      <div class="step-item" id="stepItem2">
        <div class="step-circle">2</div>
        <span class="step-label">Pagamento</span>
      </div>
      <div class="step-connector" id="conn2"></div>
      <div class="step-item" id="stepItem3">
        <div class="step-circle">3</div>
        <span class="step-label">Confirmar</span>
      </div>
    </div>

    <div class="checkout-grid">

      <!-- FORMULÁRIO -->
      <form id="checkoutForm" onsubmit="submitOrder(event)">

        <!-- STEP 1: ENDEREÇO -->
        <div class="checkout-step-content" id="step1">
          <div class="checkout-section">
            <h3>📍 Endereço de Entrega</h3>

            <div class="form-row" style="margin-bottom:0">
              <div class="form-group">
                <label class="form-label">CEP *</label>
                <input id="cep" class="form-control" type="text"
                  placeholder="00000-000" maxlength="9" inputmode="numeric"
                  oninput="mascaraCEP(this)" onblur="buscaCEP()">
              </div>
              <div class="form-group" style="display:flex;align-items:flex-end">
                <button type="button" class="btn btn-outline btn-sm btn-block" onclick="buscaCEP()">
                  🔍 Buscar CEP
                </button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Rua / Logradouro *</label>
              <input id="rua" class="form-control" type="text" placeholder="Nome da rua" required>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Número *</label>
                <input id="numero" class="form-control" type="text" placeholder="Ex: 123" required>
              </div>
              <div class="form-group">
                <label class="form-label">Complemento</label>
                <input id="complemento" class="form-control" type="text" placeholder="Apto, bloco...">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Bairro *</label>
                <input id="bairro" class="form-control" type="text" placeholder="Bairro" required>
              </div>
              <div class="form-group">
                <label class="form-label">Cidade / UF *</label>
                <input id="cidade" class="form-control" type="text" placeholder="Cidade - UF" required>
              </div>
            </div>

            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Observações</label>
              <textarea id="observacoes" class="form-control" rows="2"
                placeholder="Ponto de referência, instruções para entrega..."></textarea>
            </div>
          </div>
        </div>

        <!-- STEP 2: PAGAMENTO -->
        <div class="checkout-step-content" id="step2" style="display:none">
          <div class="checkout-section">
            <h3>💳 Forma de Pagamento</h3>
            <div class="payment-options">
              <div class="payment-option selected" data-value="pix">
                <span class="icon">📱</span> PIX
              </div>
              <div class="payment-option" data-value="dinheiro">
                <span class="icon">💵</span> Dinheiro
              </div>
              <div class="payment-option" data-value="cartao_credito">
                <span class="icon">💳</span> Crédito
              </div>
              <div class="payment-option" data-value="cartao_debito">
                <span class="icon">💳</span> Débito
              </div>
            </div>
          </div>
        </div>

        <!-- STEP 3: REVISÃO -->
        <div class="checkout-step-content" id="step3" style="display:none">
          <div class="checkout-section">
            <h3>🧾 Revisão do Pedido</h3>
            <div id="reviewContent"></div>
          </div>
        </div>

        <!-- NAVEGAÇÃO ENTRE ETAPAS -->
        <div class="step-navigation">
          <button type="button" class="btn btn-outline" id="btnPrev" style="display:none" onclick="goToStep(currentStep - 1)">
            ← Anterior
          </button>
          <button type="button" class="btn btn-primary" id="btnNext" onclick="goToStep(currentStep + 1)">
            Próximo →
          </button>
          <button type="submit" class="btn btn-primary btn-lg" id="btnSubmit" style="display:none">
            ✅ Confirmar Pedido
          </button>
        </div>

      </form>

      <!-- RESUMO (sempre visível) -->
      <div>
        <div class="order-summary">
          <h3>Resumo</h3>
          <div id="checkoutItems"></div>
          <div class="summary-row" style="margin-top:16px">
            <span>Subtotal</span>
            <span id="checkSubtotal">—</span>
          </div>
          <div class="summary-row">
            <span>Entrega</span>
            <span id="checkFrete">—</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span class="price" id="checkTotal">—</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/checkout.js"></script>
</body>
</html>
