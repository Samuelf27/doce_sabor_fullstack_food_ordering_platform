<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Cardápio — Doce Sabor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="/" class="navbar-logo"><span class="logo-icon">🍦</span> Doce Sabor</a>
    <ul class="navbar-links">
      <li><a href="/">Início</a></li>
      <li><a href="/cardapio.html" class="active">Cardápio</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="/carrinho.html" class="cart-btn">
        🛒 Carrinho
        <span class="cart-count" id="cartCount" style="display:none">0</span>
      </a>
      <div id="authButtons" style="display:flex;gap:8px">
        <a href="/login.html" class="btn btn-outline btn-sm">Entrar</a>
        <a href="/cadastro.html" class="btn btn-primary btn-sm">Cadastrar</a>
      </div>
      <div id="userMenu" style="display:none;align-items:center;gap:8px">
        <a href="/pedidos.html" class="btn btn-ghost btn-sm">📦</a>
        <button class="btn btn-outline btn-sm" id="logoutBtn">Sair</button>
      </div>
      <button class="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="/">🏠 Início</a>
  <a href="/cardapio.html">🍨 Cardápio</a>
  <a href="/carrinho.html">🛒 Carrinho</a>
  <a href="/login.html">🔑 Entrar</a>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="container">
    <h1>🍨 Cardápio</h1>
    <p>Escolha seus sabores favoritos e adicione ao carrinho</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <!-- FILTROS -->
    <div class="category-tabs" id="categoryTabs">
      <div class="loading" style="padding:8px"><div class="spinner" style="width:24px;height:24px"></div></div>
    </div>

    <!-- GRID DE PRODUTOS -->
    <div class="products-grid" id="productsGrid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</section>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cardapio.js"></script>
</body>
</html>
