<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Carrinho — Doce Sabor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="/" class="navbar-logo"><span class="logo-icon">🍦</span> Doce Sabor</a>
    <ul class="navbar-links">
      <li><a href="/">Cardápio</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="/carrinho.html" class="cart-btn active">
        🛒 Carrinho
        <span class="cart-count" id="cartCount" style="display:none">0</span>
      </a>
      <div id="authButtons" style="display:flex;gap:8px">
        <a href="/login.html" class="btn btn-outline btn-sm">Entrar</a>
      </div>
      <div id="userMenu" style="display:none;align-items:center;gap:8px">
        <button class="btn btn-outline btn-sm" id="logoutBtn">Sair</button>
      </div>
      <button class="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="/">🍨 Cardápio</a>
  <a href="/login.html">🔑 Entrar</a>
</div>

<div class="cart-page">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <h1 style="font-size:1.8rem">🛒 Meu Carrinho</h1>
      <button class="btn btn-ghost btn-sm" onclick="clearCart()">🗑️ Limpar</button>
    </div>

    <div class="cart-grid">
      <!-- ITENS -->
      <div class="cart-box" id="cartList">
        <div class="loading"><div class="spinner"></div></div>
      </div>

      <!-- RESUMO -->
      <div id="cartSummary">
        <div class="order-summary">
          <h3>Resumo do Pedido</h3>
          <div class="summary-row">
            <span>Subtotal (<span id="totalQty">0</span> itens)</span>
            <span id="subtotal">R$ 0,00</span>
          </div>
          <div class="summary-row">
            <span>Taxa de entrega</span>
            <span id="frete">R$ 5,00</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span class="price" id="totalFinal">R$ 0,00</span>
          </div>
          <a href="/checkout.html" class="btn btn-primary btn-block" style="margin-top:20px">
            Finalizar Pedido →
          </a>
          <a href="/" class="btn btn-ghost btn-block" style="margin-top:8px">
            ← Continuar Comprando
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/carrinho.js"></script>
</body>
</html>
