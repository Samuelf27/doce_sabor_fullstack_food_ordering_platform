<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Cadastro — Doce Sabor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="/" class="navbar-logo"><span class="logo-icon">🍦</span> Doce Sabor</a>
    <div class="navbar-actions">
      <a href="/login.html" class="btn btn-ghost btn-sm">← Já tenho conta</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">🎉</span>
      <h2>Crie sua conta</h2>
      <p>Faça seu cadastro e comece a pedir agora!</p>
    </div>

    <form id="cadastroForm">
      <div class="form-group">
        <label class="form-label">Nome completo</label>
        <input type="text" id="nome" class="form-control" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input type="tel" id="telefone" class="form-control" placeholder="(11) 99999-9999">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" id="senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div id="errorMsg" style="display:none;color:var(--danger);font-size:.85rem;margin-bottom:12px;padding:10px;background:#FEE2E2;border-radius:8px"></div>
      <button type="submit" class="btn btn-primary btn-block" id="cadastroBtn">
        Criar Conta
      </button>
    </form>

    <div class="auth-footer">
      Já tem conta? <a href="/login.html">Entrar</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
document.getElementById('cadastroForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('cadastroBtn');
  const err = document.getElementById('errorMsg');
  btn.disabled    = true;
  btn.textContent = 'Criando conta...';
  err.style.display = 'none';

  try {
    const res = await API.post('/auth/registrar', {
      nome:     document.getElementById('nome').value,
      email:    document.getElementById('email').value,
      telefone: document.getElementById('telefone').value,
      senha:    document.getElementById('senha').value
    });
    Auth.login(res.token, res.usuario);
    showToast('Conta criada com sucesso!', 'success');
    setTimeout(() => window.location.href = '/', 1200);
  } catch (e) {
    err.textContent   = e.message;
    err.style.display = 'block';
    btn.disabled      = false;
    btn.textContent   = 'Criar Conta';
  }
});
</script>
</body>
</html>
